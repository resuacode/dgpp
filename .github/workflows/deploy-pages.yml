name: Deploy Docusaurus to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un unico despliegue a la vez. Se cancela el que este en curso para evitar que
# una publicacion encolada o atascada bloquee al siguiente (error transitorio
# "Deployment failed, try again later." de GitHub Pages).
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      # Genera un PDF por tema (solo contenido visible) dentro de build/pdf/,
      # imprimiendo el sitio ya construido con un navegador headless.
      - name: Generate theme PDFs
        run: npm run generate-pdfs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Reintentos ante fallos transitorios de la API de GitHub Pages.
          timeout: 600000
          error_count: 10
          reporting_interval: 5000
